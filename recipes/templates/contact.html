<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Request | TastyTrail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/contact.css">
</head>

<body>




  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom fixed-top px-3">
    <a class="navbar-brand" href="#">
      <img src="https://img.icons8.com/ios-filled/40/ffffff/cooking-book.png" alt="Logo" width="36" height="36">
      TastyTrail
    </a>

    <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/recipelist/">Recipes</a></li>
        <li class="nav-item"><a class="nav-link" href="/contact/">Contact</a></li>
      </ul>


    </div>
  </nav>


  <!-- Contact Form Section -->
  <section class="form-section">
    <div class="request-card">
      <h2 class="form-title">Submit a Recipe Request</h2>

      <hr>
      {% if messages %}
      <div class="alert alert-info" role="alert">
        {% for message in messages %}
        {{ message }}
        {% endfor %}
      </div>
      {% endif %}
      <hr>
      
      <form method="get">

        <div class="mb-4">
          <label for="username" class="form-label">Your Name</label>
          <input type="text" class="form-control" id="username" placeholder="Enter your name" name="username"
            required />
        </div>

        <div class="mb-4">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" name="email" required />
        </div>

        <div class="mb-4">
          <label for="recipeName" class="form-label">Recipe Name</label>
          <input type="text" class="form-control" id="recipeName" placeholder="Suggest a recipe" name="RecipeName"
            required />
        </div>

        <div class="mb-4">
          <label for="recipeImage" class="form-label">Upload Recipe Image (optional)</label>
          <input type="file" class="form-control" id="recipeImage" accept="image/*" name="recipeImage" />
        </div>

        <button type="submit" class="btn btn-orange">Submit Request</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 TastyTrail. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
