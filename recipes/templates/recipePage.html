<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Recipes | TastyTrail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/recipelist.css">
</head>

<body>


    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top px-3">
        <a class="navbar-brand" href="#">
            <img src="https://img.icons8.com/ios-filled/40/ffffff/cooking-book.png" alt="Logo" width="36" height="36">
            TastyTrail
        </a>

        <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/recipelist/">Recipes</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact/">Contact</a></li>
            </ul>

        </div>
    </nav>


    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <h1 class="display-5">Explore All Recipes</h1>
            <p class="lead">Handpicked meals just for you.</p>
        </div>
    </section>

    <!-- Recipe Cards -->
    <section class="container py-5">

        <div class="row mb-4 justify-content-center">
            <div class="col-md-6">
                <form class="d-flex" role="search" method="get">
                    <input class="form-control me-2" type="search" placeholder="Search recipes..."aria-label="Search recipes" id="searchInput" name="search" />
                    <button class="btn btn-outline-primary" type="submit">Search</button>
                </form>
            </div>
        </div>


        <div class="row g-4 mt-3">
            <!-- Card 1 -->
           {% for recipe in recipes_data %}
            <div class="col-md-4">
                <div class="card h-100 shadow recipe-card border-0">
                    <div class="card-img-container">
                        <img src="/media/{{recipe.recipe_img}}" class="card-img-top" alt="Pasta">
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">{{recipe.recipe_name}}</h5>
                    
                        <p>{{recipe.recipe_dec}}</p>
                        <a href="/recipeview/{{recipe.id}}" class="btn btn-outline-primary mt-auto">View Recipe</a>
                    </div>
                </div>
            </div>
            {% endfor %}

            <!-- More cards can go here -->

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 TastyTrail. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
